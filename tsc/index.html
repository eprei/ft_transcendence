<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="index.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>tsc</title>
    </head>
    <body>
        <div id="root"></div>
        <h1>Number guessing game</h1>

        <p>
            This program was design with this JavaScript introduction:
            <a
                href="https://developer.mozilla.org/en-US/docs/Learn/JavaScript/First_steps/A_first_splash#example_%E2%80%94_guess_the_number_game"
                >developer.mozilla.org</a
            >
        </p>
        <p>
            We have selected a random number between 1 and 100. See if you can
            guess it in 10 turns or fewer. We'll tell you if your guess was too
            high or too low.
        </p>

        <label> Enter a guess: </label>

        <input
            type="number"
            id="guessNumber"
            placeholder="Enter a number"
            min="0"
            max="100"
        />
        <input type="submit" id="submitButton" value="Submit guess" />

        <div id="scriptOutput"></div>

        <script src="dist/main.js"></script>
    </body>
</html>
